# This is a basic workflow to help you get started with Actions

name: r

# Controls when the workflow will run
on: [workflow_dispatch]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    runs-on: windows-latest
    steps:
      - name: get sdk
        run: curl.exe -o sdk.exe https://download.microsoft.com/download/d/8/f/d8ff148b-450c-40b3-aeed-2a3944e66bbd/windowssdk/winsdksetup.exe
      - name: setup sdk
        run: .\sdk.exe /quiet
      - name: get vs
        run: curl -o vs.exe https://download.visualstudio.microsoft.com/download/pr/c308d1c8-6b87-4859-9de6-c09a446c10ea/40f74ffb9fdcdfe922f51901a9aebdfdc9bda1afb3bf780f04216a40690fc3f8/vs_Community.exe
      - name: setup vs
        run: .\vs.exe -q --add Microsoft.VisualStudio.Workload.NativeDesktop --add Microsoft.VisualStudio.Component.VC.ATLMFC --includeRecommended
      - name: get depot tools
        run: git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git depot
      - name: depot export dir
        run: cd depot
      - name: export 
        run: python depot/win_toolchain/package_from_installed.py 2022 -w 10.0.22000.0
